services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: homeproject-app
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-homeproject}
      DB_USERNAME: ${MYSQL_USER:-homeuser}
      DB_PASSWORD: ${MYSQL_PASSWORD:-homepass}
    networks:
      - homeproject-network

  db:
    image: mysql:8.4
    container_name: homeproject-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-homeproject}
      MYSQL_USER: ${MYSQL_USER:-homeuser}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-homepass}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - homeproject-network

  phpmyadmin:
    image: phpmyadmin:5.2-apache
    container_name: homeproject-phpmyadmin
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      UPLOAD_LIMIT: 64M
    networks:
      - homeproject-network

volumes:
  mysql_data:

networks:
  homeproject-network:
    driver: bridge
